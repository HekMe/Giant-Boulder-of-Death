<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boulder Rampage (Gist build)</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui,sans-serif;background:#10131b;color:#fff}
    #game{display:block;width:100vw;height:100vh}
    #hud{position:fixed;left:12px;top:12px;background:#0009;padding:10px;border-radius:10px;min-width:220px;z-index:20}
    #meterWrap{width:200px;height:14px;background:#333;border-radius:8px;overflow:hidden;margin-top:6px}
    #meter{height:100%;width:0;background:linear-gradient(90deg,#63f,#0ff)}
    #state{font-weight:700;color:#ffd95b;margin-top:4px}
    #meta{position:fixed;right:12px;top:12px;display:flex;gap:8px;flex-wrap:wrap;max-width:60vw;z-index:20}
    button,.importLabel{background:#1f2937;border:1px solid #4b5563;color:#fff;padding:8px 10px;border-radius:8px;cursor:pointer}
    .importLabel input{display:none}
    #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:#111d;padding:8px 14px;border-radius:8px;display:none;z-index:30}
    #mobileControls{position:fixed;inset:0;pointer-events:none;z-index:25}
    #stickZone{position:absolute;left:16px;bottom:16px;width:120px;height:120px;border-radius:50%;background:#ffffff22;display:none;pointer-events:auto}
    #stick{position:absolute;left:45px;top:45px;width:30px;height:30px;border-radius:50%;background:#fff7}
    #jumpBtn{position:absolute;right:18px;bottom:28px;width:96px;height:96px;border-radius:50%;font-weight:700;display:none;pointer-events:auto}
    .mobile #stickZone,.mobile #jumpBtn{display:block}
    .overlay{position:fixed;inset:0;background:#0008;display:grid;place-items:center;z-index:40}
    .hidden{display:none}.panel{background:#111e;padding:16px;border-radius:12px;min-width:280px}.row{display:flex;gap:8px;margin-top:12px}
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div>Score: <span id="score">0</span></div><div>Distance: <span id="distance">0</span>m</div><div>Coins: <span id="coins">0</span></div><div>Gems: <span id="gems">0</span></div><div>Mult: <span id="mult">x1</span></div>
    <div id="state">NORMAL</div><div id="meterWrap"><div id="meter"></div></div>
  </div>
  <div id="meta">
    <button id="btnPause">Pause</button><button id="btnRestart">Restart</button><button id="btnSpin">Spin (8 gems)</button>
    <button id="btnUpgradeJump">Upgrade Jump</button><button id="btnUpgradeSteer">Upgrade Steer</button><button id="btnUpgradeOverdrive">Upgrade Overdrive</button>
    <button id="btnExport">Export Save</button><label class="importLabel">Import Save<input id="importSave" type="file" accept="application/json"></label>
  </div>
  <div id="gameOver" class="overlay hidden"><div class="panel"><h2>Run Ended</h2><div>Distance: <span id="goDistance">0</span>m</div><div>Score: <span id="goScore">0</span></div><div class="row"><button id="btnContinue">Continue (12 gems)</button><button id="btnNewRun">New Run</button></div></div></div>
  <div id="mobileControls"><div id="stickZone"><div id="stick"></div></div><button id="jumpBtn">JUMP</button></div>
  <div id="toast"></div>

<script>
const DATA={
 balance:{"physics":{"mass":520,"radius":1.15,"gravity":26,"slopeAccel":18,"maxForwardSpeed":44,"dragLongitudinal":0.03,"dragLateral":0.22,"sideSlipFactor":0.28,"steerTorque":540,"lateralControlStrength":0.9,"jumpImpulse":8.8,"jumpCooldown":0.62,"coyoteTime":0.1,"postOverdriveGrace":0.4,"overdriveDuration":7},"scoring":{"meterCapacity":100,"overdriveScoreBonus":0.3,"overflowMeterToScore":12},"spawning":{"early":{"destructibles":18,"hazards":4,"coins":12,"gems":0.4},"mid":{"destructibles":22,"hazards":7,"coins":10,"gems":0.6},"late":{"destructibles":26,"hazards":10,"coins":8,"gems":0.8}}},
 objects:{"objects":[{"id":"hut_wood_a","category":"destructible","baseScore":40,"destructionValue":8},{"id":"cart_market","category":"destructible","baseScore":55,"destructionValue":10},{"id":"totem_stone_small","category":"destructible","baseScore":70,"destructionValue":12},{"id":"fence_long","category":"destructible","baseScore":25,"destructionValue":5},{"id":"pine_cluster","category":"destructible","baseScore":35,"destructionValue":6},{"id":"spike_patch","category":"hazard"},{"id":"mine_barrel","category":"hazard"},{"id":"cliff_gap_small","category":"hazard"},{"id":"coin_pickup","category":"pickup_coin","amount":1},{"id":"gem_pickup","category":"pickup_gem","amount":1}]},
 goals:{"goalTrees":[{"id":"goals_alpine_01","nodes":[{"id":"g01","type":"distance_total","target":500,"reward":{"coins":300},"unlocks":["g02","g03"]},{"id":"g02","type":"destroy_any","target":30,"reward":{"coins":350},"unlocks":["g04"]},{"id":"g03","type":"collect_coin","target":200,"reward":{"coins":300},"unlocks":["g05"]},{"id":"g04","type":"activate_overdrive","target":5,"reward":{"gems":4},"unlocks":["g06"]},{"id":"g05","type":"collect_gem","target":10,"reward":{"gems":5},"unlocks":["g07"]},{"id":"g06","type":"run_single_distance","target":1200,"reward":{"coins":600},"unlocks":["g08"]},{"id":"g07","type":"destroy_any","target":120,"reward":{"coins":500},"unlocks":["g08"]},{"id":"g08","type":"survive_hazard_gauntlet","target":3,"reward":{"gems":6},"unlocks":["g09","g10"]},{"id":"g09","type":"destroy_in_overdrive","target":150,"reward":{"coins":900},"unlocks":["g11"]},{"id":"g10","type":"no_jump_distance","target":600,"reward":{"coins":700},"unlocks":["g12"]},{"id":"g11","type":"pickup_charge","target":40,"reward":{"gems":7},"unlocks":["g13"]},{"id":"g12","type":"near_miss_hazard","target":20,"reward":{"coins":850},"unlocks":["g13"]},{"id":"g13","type":"run_single_score","target":90000,"reward":{"gems":10},"unlocks":["g14"]},{"id":"g14","type":"continue_used_wins","target":2,"reward":{"coins":1200},"unlocks":["g15"]},{"id":"g15","type":"theme_mastery","target":1,"reward":{"unlockTheme":"volcanic_carnival"},"unlocks":[]}]}]},
 upgrades:{"upgrades":[{"id":"jump_height","costsCoins":[250,600,1200,2200,3800,6200],"bonusesPercent":[5,10,15,20,25,30]},{"id":"steering_speed","costsCoins":[250,650,1300,2400,4100,6600],"bonusesPercent":[5,10,15,20,25,30]},{"id":"overdrive_duration","costsCoins":[400,900,1700,3000,5000,7800],"bonusesPercent":[10,20,30,40,50,60]}]},
 spinners:{"spinCostGems":8,"buffs":[{"id":"less_spikes","weight":24},{"id":"coin_magnet","weight":20},{"id":"gem_frequency","weight":16},{"id":"dud_mines","weight":14},{"id":"power_charge_rate","weight":18}],"rareEvents":[{"id":"event_yeti_swarm","weight":8}]}
};

const $=id=>document.getElementById(id);const toastEl=$('toast');const showToast=(t,m=1700)=>{toastEl.textContent=t;toastEl.style.display='block';clearTimeout(showToast.t);showToast.t=setTimeout(()=>toastEl.style.display='none',m)};
const isMobile=/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent); if(isMobile)document.body.classList.add('mobile');
const saveKey='boulder_rampage_gist_v1';
const defaultSave=()=>({version:1,currencies:{coins:500,gems:30},upgrades:{jump_height:0,steering_speed:0,overdrive_duration:0},completedGoals:[],goalProgress:{},stats:{bestDistance:0,bestScore:0,totalRuns:0,totalDestructions:0,totalOverdrives:0}});
let save=(()=>{try{return {...defaultSave(),...JSON.parse(localStorage.getItem(saveKey)||'{}')}}catch{return defaultSave()}})(); const persistSave=()=>localStorage.setItem(saveKey,JSON.stringify(save));

const balance=DATA.balance, objectsCfg=DATA.objects, goalsCfg=DATA.goals, upgradesCfg=DATA.upgrades, spinnersCfg=DATA.spinners;
const canvas=$('game');const engine=new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true});const scene=new BABYLON.Scene(engine);scene.clearColor=new BABYLON.Color4(.68,.84,1,1);
new BABYLON.HemisphericLight('h',new BABYLON.Vector3(0,1,0),scene).intensity=.9; const dl=new BABYLON.DirectionalLight('d',new BABYLON.Vector3(-.4,-1,.2),scene); dl.position=new BABYLON.Vector3(40,80,-20);
const camera=new BABYLON.FreeCamera('cam',new BABYLON.Vector3(0,8,-12),scene);
const boulder=BABYLON.MeshBuilder.CreateSphere('b',{diameter:balance.physics.radius*2,segments:18},scene); const bm=new BABYLON.StandardMaterial('bm',scene); bm.diffuseColor=new BABYLON.Color3(.56,.55,.5); bm.specularColor=BABYLON.Color3.Black(); boulder.material=bm;
const trail=BABYLON.MeshBuilder.CreateCylinder('t',{height:3,diameterTop:1.2,diameterBottom:2.2,tessellation:8},scene); trail.rotation.x=Math.PI/2; const tm=new BABYLON.StandardMaterial('tm',scene); tm.emissiveColor=new BABYLON.Color3(.3,.8,1); tm.alpha=0; trail.material=tm;

const CHUNK=['STRAIGHT','S_CURVE','NARROW','VILLAGE_CLUSTER','FOREST_DENSE','CLIFF_BUMPY','HAZARD_GAUNTLET'];
const cfg={STRAIGHT:{w:14,hm:.8,dm:1,t:0},S_CURVE:{w:12,hm:1,dm:1,t:.8},NARROW:{w:8.5,hm:.9,dm:.8,t:.3},VILLAGE_CLUSTER:{w:13,hm:1.05,dm:1.4,t:.35},FOREST_DENSE:{w:11.2,hm:.95,dm:1.25,t:.45},CLIFF_BUMPY:{w:9.5,hm:1.15,dm:.9,t:.6},HAZARD_GAUNTLET:{w:10.2,hm:1.6,dm:.7,t:.5}};
const len=45,chunks=[],pool={destructible:[],hazard:[],pickup_coin:[],pickup_gem:[],telegraph:[]};let nextZ=0,curve=0;
const r=(a,b)=>a+Math.random()*(b-a),pick=id=>objectsCfg.objects.find(o=>o.id===id);
function mFor(c){let m;if(c==='destructible')m=BABYLON.MeshBuilder.CreateBox('d',{size:1.2},scene);else if(c==='hazard')m=BABYLON.MeshBuilder.CreateCylinder('h',{diameterTop:0,diameterBottom:1.2,height:1.3,tessellation:6},scene);else if(c==='pickup_coin')m=BABYLON.MeshBuilder.CreateTorus('c',{diameter:.75,thickness:.2,tessellation:12},scene);else if(c==='pickup_gem')m=BABYLON.MeshBuilder.CreatePolyhedron('g',{type:1,size:.45},scene);else m=BABYLON.MeshBuilder.CreatePlane('p',{size:1.1},scene);const mat=new BABYLON.StandardMaterial('m'+Math.random(),scene);if(c==='destructible')mat.diffuseColor=new BABYLON.Color3(.6,.43,.27);else if(c==='hazard')mat.diffuseColor=new BABYLON.Color3(.2,.2,.2);else if(c==='pickup_coin'){mat.diffuseColor=new BABYLON.Color3(1,.86,.22);mat.emissiveColor=new BABYLON.Color3(.2,.14,0)}else if(c==='pickup_gem'){mat.diffuseColor=new BABYLON.Color3(.2,.9,1);mat.emissiveColor=new BABYLON.Color3(.08,.22,.3)}else{mat.diffuseColor=new BABYLON.Color3(1,.77,.2);mat.emissiveColor=new BABYLON.Color3(.2,.12,0)}mat.specularColor=BABYLON.Color3.Black();m.material=mat;return m}
const get=c=>pool[c].pop()||mFor(c), rel=o=>{o.setEnabled(false);pool[o.metadata.category].push(o)};
function mk(t){const root=new BABYLON.TransformNode('chunk',scene);const g=BABYLON.MeshBuilder.CreateBox('g',{width:cfg[t].w,height:1,depth:len},scene);const gm=new BABYLON.StandardMaterial('gm'+Math.random(),scene);gm.diffuseColor=new BABYLON.Color3(.4,.58,.34);gm.specularColor=BABYLON.Color3.Black();g.material=gm;g.parent=root;g.position.y=-.5;return {root,t,w:cfg[t].w,objs:[],blocked:[]}}
function phase(d){return d<800?'e':d<2400?'m':'l'}
function wt(d){const p=phase(d),w={STRAIGHT:p==='e'?1.5:1,S_CURVE:p==='e'?1:1.3,NARROW:p==='l'?1.4:.8,VILLAGE_CLUSTER:1.2,FOREST_DENSE:1.1,CLIFF_BUMPY:p==='l'?1.2:.9,HAZARD_GAUNTLET:p==='e'?.35:p==='m'?1:1.4};let tot=0;CHUNK.forEach(k=>tot+=w[k]);let rr=Math.random()*tot;for(const k of CHUNK){rr-=w[k];if(rr<=0)return k}return 'STRAIGHT'}
function fair(x,z,s,ch,l){const min=s*.65+6,la=Math.max(3,Math.min(10,s*.22));if((z-player.z)<min-la)return false;if(Math.abs(x)>ch.w*.5-1.1)return false;if(ch.blocked.includes(l))return false;return true}
function fill(ch,dif){const dens=dif<.33?balance.spawning.early:dif<.66?balance.spawning.mid:balance.spawning.late, cc=cfg[ch.t],z0=ch.root.position.z-len/2,half=ch.w*.5-1,lx=[-half*.7,0,half*.7];ch.blocked=[];const ls=player.buffs.less_spikes?.s?.1?0.75:1,gm=player.buffs.gem_frequency?.s?1.25:1;const d=Math.round((dens.destructibles/100)*len*cc.dm),h=Math.round((dens.hazards/100)*len*cc.hm*ls),c=Math.round((dens.coins/100)*len),g=Math.round((dens.gems/100)*len*gm);
for(let i=0;i<d;i++){const id=i%3===0?'cart_market':i%2===0?'hut_wood_a':'fence_long',t=pick(id),m=get(t.category);m.metadata={type:t,category:t.category};m.setEnabled(true);m.position.set(r(-half,half),.8,z0+r(2,len-2));ch.objs.push(m)}
for(let i=0;i<h;i++){const l=Math.floor(Math.random()*3)-1,x=lx[l+1]+r(-.4,.4),z=z0+r(8,len-2);if(!fair(x,z,player.speed,ch,l))continue;const mine=Math.random()<.4,t=pick(mine?'mine_barrel':'spike_patch');if(mine&&player.buffs.dud_mines?.s&&Math.random()<.35)continue;const m=get(t.category);m.metadata={type:t,category:t.category};m.setEnabled(true);m.position.set(x,.8,z);ch.objs.push(m);const te=get('telegraph');te.metadata={category:'telegraph'};te.setEnabled(true);te.rotation.x=Math.PI/2;te.position.set(x,.1,z-4.5);ch.objs.push(te);if(!ch.blocked.includes(l))ch.blocked.push(l);if(ch.blocked.length>=2&&ch.t!=='HAZARD_GAUNTLET')break}
for(let i=0;i<c;i++){const t=pick('coin_pickup'),m=get(t.category);m.metadata={type:t,category:t.category};m.setEnabled(true);m.position.set(r(-half,half),1.1,z0+r(2,len-2));ch.objs.push(m)}
for(let i=0;i<g;i++){const t=pick('gem_pickup'),m=get(t.category);m.metadata={type:t,category:t.category};m.setEnabled(true);m.position.set(r(-half,half),1.25,z0+r(2,len-2));ch.objs.push(m)} }
function recycle(ch){ch.objs.forEach(rel);ch.objs=[];ch.root.setEnabled(false)}
function ensure(){while(chunks.length<12){const t=wt(player.distance),ch=mk(t);ch.root.setEnabled(true);ch.root.position.z=nextZ+len/2;curve+=(Math.random()*2-1)*cfg[t].t;curve=Math.max(-8,Math.min(8,curve));ch.root.position.x=curve;fill(ch,Math.min(1,player.distance/3000));chunks.push(ch);nextZ+=len}while(chunks.length&&chunks[0].root.position.z<player.z-75){recycle(chunks.shift())}}

const input={s:0,j:false,g:false,gv:0};window.addEventListener('keydown',e=>{if(e.code==='KeyA'||e.code==='ArrowLeft')input.s=-1;if(e.code==='KeyD'||e.code==='ArrowRight')input.s=1;if(e.code==='Space')input.j=true});window.addEventListener('keyup',e=>{if(['KeyA','ArrowLeft','KeyD','ArrowRight'].includes(e.code))input.s=0});if(window.DeviceOrientationEvent)window.addEventListener('deviceorientation',e=>{input.gv=Math.max(-1,Math.min(1,(e.gamma||0)/18));input.g=true});
const sz=$('stickZone'),sk=$('stick');let sa=false;function us(x,y){const r=sz.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=x-cx,dy=y-cy,l=Math.min(45,Math.hypot(dx,dy)),a=Math.atan2(dy,dx),sx=Math.cos(a)*l,sy=Math.sin(a)*l;sk.style.left=`${45+sx}px`;sk.style.top=`${45+sy}px`;input.s=sx/45}sz.addEventListener('pointerdown',e=>{sa=true;us(e.clientX,e.clientY)});window.addEventListener('pointermove',e=>{if(sa)us(e.clientX,e.clientY)});window.addEventListener('pointerup',()=>{sa=false;sk.style.left='45px';sk.style.top='45px';input.s=0});$('jumpBtn').addEventListener('pointerdown',()=>input.j=true);window.addEventListener('pointerdown',e=>{if(isMobile&&e.clientX>innerWidth*0.6)input.j=true});

const player={x:0,y:balance.physics.radius+.1,z:0,vx:0,vy:0,speed:10,ground:true,jcd:0,coy:0,state:'NORMAL',grace:0,over:0,meter:0,score:0,distance:0,mult:1,buffs:{},paused:false,dead:false,cont:0,shake:0};
const up=id=>{const u=upgradesCfg.upgrades.find(x=>x.id===id),l=save.upgrades[id]||0;return u.bonusesPercent[l-1]||0};
function buy(id){const u=upgradesCfg.upgrades.find(x=>x.id===id),l=save.upgrades[id]||0;if(l>=u.costsCoins.length)return showToast('Max level');const c=u.costsCoins[l];if(save.currencies.coins<c)return showToast(`Need ${c} coins`);save.currencies.coins-=c;save.upgrades[id]=l+1;persistSave();showToast(`${id} -> ${l+1}`)}
$('btnUpgradeJump').onclick=()=>buy('jump_height');$('btnUpgradeSteer').onclick=()=>buy('steering_speed');$('btnUpgradeOverdrive').onclick=()=>buy('overdrive_duration');$('btnPause').onclick=()=>player.paused=!player.paused;$('btnRestart').onclick=()=>reset();
$('btnExport').onclick=()=>{const blob=new Blob([JSON.stringify(save,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='savegame.json';a.click()};$('importSave').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;try{save={...defaultSave(),...JSON.parse(await f.text())};persistSave();showToast('Save imported')}catch{showToast('Invalid JSON')}});
$('btnSpin').onclick=()=>{if(save.currencies.gems<spinnersCfg.spinCostGems)return showToast('Not enough gems');save.currencies.gems-=spinnersCfg.spinCostGems;const all=[...spinnersCfg.buffs,...spinnersCfg.rareEvents],tot=all.reduce((a,b)=>a+b.weight,0),pick=()=>{let rr=Math.random()*tot;for(const b of all){rr-=b.weight;if(rr<=0)return b}return all[0]};const rolled=[];for(let i=0;i<3;i++){const b=pick();rolled.push(b.id);player.buffs[b.id]={s:(player.buffs[b.id]?.s||0)+1}}if(rolled.includes('event_yeti_swarm')){player.score+=3000;save.currencies.coins+=80}persistSave();showToast(`Spin: ${rolled.join(', ')}`,2200)};
function goal(type,d){const t=goalsCfg.goalTrees[0];for(const n of t.nodes){if(save.completedGoals.includes(n.id))continue;if(n.type!==type)continue;save.goalProgress[n.id]=(save.goalProgress[n.id]||0)+d;if(save.goalProgress[n.id]>=n.target){save.completedGoals.push(n.id);save.currencies.coins+=n.reward.coins||0;save.currencies.gems+=n.reward.gems||0;showToast(`Goal ${n.id} complete`)}}}
function end(){player.dead=true;player.paused=true;save.currencies.coins+=Math.floor(player.distance*.06+save.stats.totalDestructions*.01);save.stats.bestDistance=Math.max(save.stats.bestDistance,Math.floor(player.distance));save.stats.bestScore=Math.max(save.stats.bestScore,Math.floor(player.score));persistSave();$('goDistance').textContent=Math.floor(player.distance);$('goScore').textContent=Math.floor(player.score);$('btnContinue').textContent=`Continue (${player.cont===0?12:20} gems)`;$('gameOver').classList.remove('hidden')}
$('btnContinue').onclick=()=>{const c=player.cont===0?12:20;if(player.cont>=2)return showToast('No continues left');if(save.currencies.gems<c)return showToast('Not enough gems');save.currencies.gems-=c;player.cont++;player.dead=false;player.paused=false;player.state='NORMAL';player.grace=2;player.vy=2.4;$('gameOver').classList.add('hidden');persistSave()};$('btnNewRun').onclick=()=>reset();
function reset(){Object.assign(player,{x:0,y:balance.physics.radius+.1,z:0,vx:0,vy:0,speed:10,ground:true,jcd:0,coy:0,state:'NORMAL',grace:0,over:0,meter:0,score:0,distance:0,mult:1,buffs:{},paused:false,dead:false,cont:0,shake:0});chunks.splice(0).forEach(recycle);nextZ=0;curve=0;save.stats.totalRuns++;persistSave();$('gameOver').classList.add('hidden')}
function col(){const rr=1.3*1.3;for(const c of chunks){for(let i=c.objs.length-1;i>=0;i--){const o=c.objs[i];if(!o.isEnabled())continue;const dx=o.position.x-player.x,dz=o.position.z-player.z;if(dx*dx+dz*dz>rr)continue;const t=o.metadata.type;c.objs.splice(i,1);rel(o);if(!t)continue;if(t.category==='destructible'||(t.category==='hazard'&&player.state==='OVERDRIVE')){player.score+=(t.baseScore||50)*player.mult*(player.state==='OVERDRIVE'?1.3:1);player.meter+=(t.destructionValue||8)*(player.buffs.power_charge_rate?.s?1.3:1);player.shake=Math.max(player.shake,.14);save.stats.totalDestructions++;goal('destroy_any',1);if(player.state==='OVERDRIVE')goal('destroy_in_overdrive',1)}else if(t.category==='hazard'){if(player.grace>0){player.grace=0;player.vx+=(Math.random()*2-1)*3.5;showToast('Grace saved you')}else end()}else if(t.category==='pickup_coin'){save.currencies.coins+=t.amount||1;player.score+=10;goal('collect_coin',t.amount||1)}else if(t.category==='pickup_gem'){save.currencies.gems+=t.amount||1;player.score+=40;goal('collect_gem',t.amount||1)}}}}
function mag(dt){if(!player.buffs.coin_magnet?.s)return;for(const c of chunks){for(const o of c.objs){if(!o.isEnabled()||o.metadata?.type?.category!=='pickup_coin')continue;const dx=player.x-o.position.x,dz=player.z-o.position.z,d=dx*dx+dz*dz;if(d<16){o.position.x+=dx*dt*4.2;o.position.z+=dz*dt*4.2}}}}
function ui(){$('score').textContent=Math.floor(player.score);$('distance').textContent=Math.floor(player.distance);$('coins').textContent=save.currencies.coins;$('gems').textContent=save.currencies.gems;$('mult').textContent=`x${player.mult}`;$('state').textContent=player.state+(player.grace>0?' (GRACE)':'');$('meter').style.width=`${Math.min(1,player.meter/balance.scoring.meterCapacity)*100}%`}

reset();let last=performance.now();engine.runRenderLoop(()=>{const now=performance.now(),dt=Math.min(.033,(now-last)/1000);last=now;if(!player.paused){const sIn=input.g&&isMobile?input.gv:input.s,sMul=1+up('steering_speed')/100,jMul=1+up('jump_height')/100,oMul=1+up('overdrive_duration')/100;player.speed+=(balance.physics.slopeAccel-balance.physics.dragLongitudinal*player.speed*player.speed*.1)*dt;player.speed=Math.min(balance.physics.maxForwardSpeed,player.speed);player.vx+=sIn*balance.physics.lateralControlStrength*sMul*dt*12;player.vx*=(1-balance.physics.dragLateral*dt);player.x+=player.vx*dt;const cur=chunks.find(c=>player.z>c.root.position.z-len/2&&player.z<c.root.position.z+len/2),half=(cur?cur.w:13)*.5,center=cur?cur.root.position.x:0;if(player.x<center-half||player.x>center+half)end();player.jcd-=dt;player.coy=player.ground?balance.physics.coyoteTime:player.coy-dt;if(input.j&&player.jcd<=0&&(player.ground||player.coy>0)){player.vy=balance.physics.jumpImpulse*jMul;player.ground=false;player.jcd=balance.physics.jumpCooldown}input.j=false;player.vy-=balance.physics.gravity*dt;player.y+=player.vy*dt;if(player.y<=balance.physics.radius+.1){if(!player.ground)player.vx+=(Math.random()-.5)*1.3;player.y=balance.physics.radius+.1;player.vy=0;player.ground=true}player.z+=player.speed*dt;player.distance=player.z;if(player.state==='OVERDRIVE'){player.over-=dt;if(player.over<=0){player.state='NORMAL';player.grace=balance.physics.postOverdriveGrace}}else if(player.grace>0)player.grace-=dt;if(player.meter>=balance.scoring.meterCapacity&&player.state!=='OVERDRIVE'){player.state='OVERDRIVE';player.over=balance.physics.overdriveDuration*oMul;player.meter=0;save.stats.totalOverdrives++;goal('activate_overdrive',1)}const f=player.meter/balance.scoring.meterCapacity;player.mult=f<.17?1:f<.34?2:f<.51?3:f<.68?4:f<.85?5:6;ensure();mag(dt);col();goal('distance_total',player.speed*dt)}
boulder.position.set(player.x,player.y,player.z);boulder.rotate(BABYLON.Axis.X,-(player.speed*dt)/balance.physics.radius,BABYLON.Space.LOCAL);boulder.rotate(BABYLON.Axis.Z,-(player.vx*dt)/balance.physics.radius,BABYLON.Space.LOCAL);trail.position.set(player.x,player.y,player.z-1.3);tm.alpha+=((player.state==='OVERDRIVE' ? .42 : 0)-tm.alpha)*.14;bm.emissiveColor=player.state==='OVERDRIVE'?new BABYLON.Color3(.14,.3,.4):BABYLON.Color3.Black();player.shake=Math.max(0,player.shake-dt*1.8);const la=Math.max(3,Math.min(10,player.speed*.22)),tx=player.x+(Math.random()*2-1)*player.shake,ty=player.y+5.8+(Math.random()*2-1)*player.shake,tz=player.z-10.5;camera.position=BABYLON.Vector3.Lerp(camera.position,new BABYLON.Vector3(tx,ty,tz),player.state==='OVERDRIVE' ? .14 : .1);camera.setTarget(new BABYLON.Vector3(player.x,player.y+1.1,player.z+la));camera.fov+=((player.state==='OVERDRIVE'?1.28:1.17)-camera.fov)*.1;ui();scene.render()});
window.addEventListener('resize',()=>engine.resize());
</script>
