<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROCKFALL — nekonečný zjazd</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="popups"></div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-tl">
    <div id="hudScore" class="hud-big">0</div>
    <div id="hudCombo" class="hud-combo"></div>
  </div>
  <div class="hud-tc">
    <div id="hudDist" class="hud-dist">0 m</div>
    <div id="hudBiome" class="hud-biome"></div>
  </div>
  <div class="hud-tr">
    <div class="hud-cur"><span class="ico coin"></span><span id="hudCoins">0</span></div>
    <div class="hud-cur"><span class="ico gem"></span><span id="hudGems">0</span></div>
    <button id="btnPause" class="icon-btn" aria-label="Pauza">II</button>
  </div>
  <div class="hud-bc">
    <div id="hudGoal" class="hud-goal"></div>
    <div id="hudState" class="hud-state"></div>
    <div class="meter"><div id="meterFill"></div></div>
  </div>
</div>

<!-- mobile controls -->
<div id="joystick" class="hidden"><div id="joyBase"><div id="joyKnob"></div></div></div>
<button id="btnJump" class="hidden" aria-label="Skok">SKOK</button>

<!-- START -->
<div id="ovStart" class="overlay">
  <div class="panel start-panel">
    <div class="logo"><span class="logo-rock"></span><h1>ROCK<em>FALL</em></h1></div>
    <p class="tag">Pád z neba. Hora pod tebou. Znič všetko, čo ti stojí v ceste.</p>
    <div class="cur-row"><span class="ico coin"></span><span id="menuCoins">0</span><span class="ico gem"></span><span id="menuGems">0</span></div>
    <button id="btnPlay" class="big-btn">SPUSTIŤ JAZDU</button>
    <div class="menu-grid">
      <button id="btnUpgrades" class="menu-btn">Vylepšenia</button>
      <button id="btnSpinner" class="menu-btn">Ruleta</button>
      <button id="btnGoals" class="menu-btn">Ciele</button>
      <button id="btnSettings" class="menu-btn">Nastavenia</button>
      <button id="btnExport" class="menu-btn">Export uloženia</button>
      <button id="btnImport" class="menu-btn">Import uloženia</button>
    </div>
    <input type="file" id="fileImport" accept="application/json" hidden>
    <div id="skinRow" class="skin-row"></div>
    <div id="startStats" class="start-stats"></div>
    <p class="controls-hint">A/D alebo šípky = riadenie · Medzerník = skok · Esc = pauza</p>
  </div>
</div>

<!-- RUN ENDED -->
<div id="ovEnd" class="overlay hidden">
  <div class="panel">
    <h2 id="endTitle">KONIEC JAZDY</h2>
    <div class="end-grid">
      <div><label>Vzdialenosť</label><b id="endDist">0 m</b></div>
      <div><label>Skóre</label><b id="endScore">0</b></div>
      <div><label>Mince</label><b id="endCoins">0</b></div>
      <div><label>Drahokamy</label><b id="endGems">0</b></div>
    </div>
    <div id="endBest" class="end-best hidden">NOVÝ REKORD!</div>
    <div id="endGoal" class="end-goal hidden"></div>
    <div id="hsTable" class="hs-table"></div>
    <button id="btnContinue" class="big-btn alt">POKRAČOVAŤ</button>
    <div class="row-btns">
      <button id="btnNewRun" class="menu-btn">Nová jazda</button>
      <button id="btnMenu" class="menu-btn">Menu</button>
    </div>
  </div>
</div>

<!-- PAUSE -->
<div id="ovPause" class="overlay hidden">
  <div class="panel small">
    <h2>PAUZA</h2>
    <button id="btnResume" class="big-btn">Pokračovať</button>
    <div class="row-btns">
      <button id="btnRestart" class="menu-btn">Reštart</button>
      <button id="btnQuitMenu" class="menu-btn">Menu</button>
    </div>
  </div>
</div>

<!-- UPGRADES -->
<div id="ovUpgrades" class="overlay hidden">
  <div class="panel">
    <h2>VYLEPŠENIA</h2>
    <div class="cur-row"><span class="ico coin"></span><span id="upCoins">0</span></div>
    <div id="upList" class="list"></div>
    <button id="btnUpBack" class="menu-btn">Späť</button>
  </div>
</div>

<!-- SPINNER -->
<div id="ovSpinner" class="overlay hidden">
  <div class="panel">
    <h2>RULETA ŠŤASTIA</h2>
    <div class="cur-row"><span class="ico gem"></span><span id="spGems">0</span></div>
    <div id="spinWheel" class="spin-wheel"><div id="spinDisc"></div><div class="spin-pointer"></div></div>
    <div id="spinResult" class="spin-result"></div>
    <button id="btnSpin" class="big-btn alt">Točiť (<span id="spCost">2</span> 💎)</button>
    <button id="btnSpBack" class="menu-btn">Späť</button>
  </div>
</div>

<!-- GOALS -->
<div id="ovGoals" class="overlay hidden">
  <div class="panel">
    <h2>CIELE</h2>
    <div id="goalList" class="list"></div>
    <button id="btnGoalBack" class="menu-btn">Späť</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="ovSettings" class="overlay hidden">
  <div class="panel">
    <h2>NASTAVENIA</h2>
    <div class="set-row"><label>Citlivosť riadenia</label><input type="range" id="setSens" min="0.5" max="2" step="0.1"></div>
    <div class="set-row"><label>Hlasitosť</label><input type="range" id="setVol" min="0" max="1" step="0.05"></div>
    <div class="set-row"><label>Hudba / ambient</label><input type="checkbox" id="setMusic"></div>
    <div class="set-row"><label>Kvalita grafiky</label>
      <select id="setQuality"><option value="high">Vysoká</option><option value="low">Nízka</option></select></div>
    <div class="set-row"><label>Gyroskop (mobil)</label><input type="checkbox" id="setGyro"></div>
    <div class="set-row"><label>Obmedzený pohyb kamery</label><input type="checkbox" id="setMotion"></div>
    <button id="btnSetBack" class="menu-btn">Späť</button>
  </div>
</div>

<!-- FATAL -->
<div id="ovFatal" class="overlay hidden">
  <div class="panel small fatal">
    <h2>CHYBA</h2>
    <p id="fatalMsg">Niečo sa pokazilo.</p>
    <button onclick="location.reload()" class="menu-btn">Obnoviť stránku</button>
  </div>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
